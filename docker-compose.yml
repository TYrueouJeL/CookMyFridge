services:

  mysql:
    image: mysql:8.0
    container_name: cookmyfridge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cookmyfridge
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: cookmyfridge-api
    environment:
      # DB_HOST: mysql
      # DB_PORT: 3307
      # DB_USER: root
      # DB_PASSWORD: root
      # DB_NAME: cookmyfridge
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_KEY: base64:randomkey123456789
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_DATABASE: cookmyfridge
    ports:
      - "3333:3333"
    depends_on:
      - mysql
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_URL: /api/
    container_name: cookmyfridge-web
    environment:
      - VITE_API_URL=/api/
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mysql_data: