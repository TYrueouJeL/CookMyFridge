name: Tests

on:
    pull_request:
        branches: [ main ]

jobs:
    test-api:
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: cookmyfridge_test
                ports:
                    - 3306:3306
                options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: npm
                cache-dependency-path: api/package-lock.json

            - name: Install dependencies
              working-directory: api
              run: npm ci

            - name: Run migrations
              working-directory: api
              env:
                DB_CONNECTION: mysql
                DB_HOST: 127.0.0.1
                DB_PORT: 3306
                DB_USER: root
                DB_PASSWORD: root
                DB_DATABASE: cookmyfridge_test
                APP_KEY: ${{ secrets.APP_KEY }}
                NODE_ENV: test
              run: node ace migration:run --force

            - name: Run tests
              working-directory: api
              env:
                DB_CONNECTION: mysql
                DB_HOST: 127.0.0.1
                DB_PORT: 3306
                DB_USER: root
                DB_PASSWORD: root
                DB_DATABASE: cookmyfridge_test
                APP_KEY: ${{ secrets.APP_KEY }}
                NODE_ENV: test
              run: node ace test

    test-web:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: npm
                cache-dependency-path: web/package-lock.json

            - name: Install dependencies
              working-directory: web
              run: npm ci

            - name: Typecheck
              working-directory: web
              run: npm run typecheck

            - name: Build
              working-directory: web
              env:
                VITE_API_URL: /api/
              run: npm run build