name: Deploy

on:
    push:
        branches: [ main ]

env:
    REGISTRY: docker.io
    IMAGE_API: ${{ secrets.DOCKERHUB_USERNAME }}/cookmyfridge-api
    IMAGE_WEB: ${{ secrets.DOCKERHUB_USERNAME }}/cookmyfridge-web

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              
            - name: Login in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push API
              uses: docker/build-push-action@v5
              with:
                context: .
                file: docker/api/Dockerfile
                push: true
                tags: |
                    ${{ env.IMAGE_API }}:latest
                    ${{ env.IMAGE_API }}:${{ github.sha }}

            - name: Build and Push Web
              uses: docker/build-push-action@v5
              with:
                context: .
                file: docker/web/Dockerfile
                push: true
                build-args: |
                    VITE_API_URL=/api/
                tags: | 
                    ${{ env.IMAGE_WEB }}:latest
                    ${{ env.IMAGE_WEB }}:${{ github.sha }}
        
    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
            - name: Deploy vis SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                host: ${{ secrets.VPS_HOST }}
                username: ${{ secrets.VPS_USERNAME }}
                key: ${{ secrets.VPS_SSH_KEY }}
                script: |
                  cd ~/app/CookMyFridge
                  docker pull ${{ env.IMAGE_API }}:latest
                  docker pull ${{ env.IMAGE_WEB }}:latest
                  sudo docker compose up -d
                  sudo docker image prune -f